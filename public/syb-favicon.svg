<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#080d1a"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#87ceeb" stroke-width="1" opacity="0.3"/>

  <!-- Inner background circle -->
  <circle cx="50" cy="50" r="42" fill="#0b1628"/>

  <!-- Arc accent — top-left quarter sweep -->
  <path d="M 50 8 A 42 42 0 0 0 8 50" fill="none" stroke="#87ceeb" stroke-width="3" stroke-linecap="round"/>

  <!-- S — faded left -->
  <text x="26" y="60"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#87ceeb"
    opacity="0.35"
    text-anchor="middle">S</text>

  <!-- Y — hero center -->
  <text x="50" y="60"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="800"
    fill="#87ceeb"
    text-anchor="middle">Y</text>

  <!-- B — faded right -->
  <text x="74" y="60"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="28"
    font-weight="700"
    fill="#87ceeb"
    opacity="0.35"
    text-anchor="middle">B</text>
</svg>
